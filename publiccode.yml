description:
  it-IT:
    shortDescription: Codice pronto all'uso per creare rapidamente il front-end dei
      siti scolastici in modo accessibile e coerente.
    longDescription: >-
      I template HTML del Modello Scuole mettono a disposizione pagine statiche
      esemplificative e codice pronto all'uso per realizzare il front-end del
      sito scolastico. Sono costruiti sulle fondamenta di UI Kit Italia e
      Bootstrap Italia e permettono di lavorare in modo indipendente dalle
      soluzioni tecnologiche adottate dall'amministrazione. I template sono già
      validati in termini di accessibilità e conformità alle Linee guida di
      design per i siti internet e i servizi digitali della PA e Linee guida
      sull'accessibilità degli strumenti informatici, facilitando l'adozione del
      modello di sito istituzionale delle scuole e velocizzando la realizzazione
      delle interfacce web.


      [Vai alle anteprime dei template
      HTML](https://italia.github.io/design-scuole-pagine-statiche/)

      [Vai alla documentazione del Modello
      Scuole](https://designers.italia.it/modelli/scuole/)
    documentation: https://github.com/italia/design-scuole-pagine-statiche/blob/main/README.md
    features:
      - Codice HTML, CSS e JavaScript pronto all'uso per realizzare il front-end
        del sito scolastico
      - Esempi di pagine e interfacce per il sito scolastico
      - Integra i fondamenti di UI Kit Italia e Bootstrap Italia
      - Garantisce accessibilità e conformità alle Linee guida di design per i
        siti internet e servizi digitali della PA
      - Aderenza al modello di sito scolastico di Designers Italia
